# ABOUTME: Docker — builds the actor + watcher images on every PR (validation) and pushes them
# ABOUTME: to GHCR on main. Build context is the repo root (Dockerfiles COPY from relayer-v2/...).
name: Docker

on:
  pull_request:
    paths: ["relayer-v2/**", ".github/workflows/docker.yml"]
  push:
    branches: [main]
    paths: ["relayer-v2/**", ".github/workflows/docker.yml"]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write # push to GHCR

jobs:
  image:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [actor, watcher]
    steps:
      - uses: actions/checkout@v4
        # No submodules needed: the images do NOT embed manifests (mounted at runtime).
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        # Only used on push; harmless on PRs (login still succeeds with the read-only token).
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: relayer-v2/${{ matrix.service }}/Dockerfile
          push: ${{ github.event_name == 'push' }} # build-only on PRs
          tags: |
            ghcr.io/${{ github.repository_owner }}/armada-${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/armada-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
