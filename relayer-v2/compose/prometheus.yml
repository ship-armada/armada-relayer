# ABOUTME: Prometheus scrape config for the obs profile (spec §10.3): both services' /metrics.
# ABOUTME: Alert rules live in alerts.yml.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: armada-actor
    static_configs:
      - targets: ["actor:3001"]
  - job_name: armada-watcher
    static_configs:
      - targets: ["watcher:42069"]
